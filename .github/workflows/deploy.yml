name: Deploy to GitHub Pages

# 소스를 GitHub Actions로 빌드·배포 → 소스 이력 보존 + 커밋마다 자동 갱신 +
# 초록 체크 자체가 DevOps 증거 (PLAN §2 / docs/deployment.md)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중이던 배포는 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # 로컬/스택 베이스라인과 동일(Astro 5는 Node 20 지원)
          cache: npm
      - run: npm ci
      - run: npm run second:build # → site-v2/dist/ (site-v2 리디자인을 배포, .nojekyll 포함)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
